<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLANET NETWORK NUSANTARA</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    min-height:100vh;
    overflow:hidden;
    color:#fff;
    font-family:'Segoe UI',Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at center,#082641 0%,#031523 38%,#01070d 78%),
        linear-gradient(135deg,#020912,#062847,#0a3f6d);
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    opacity:.18;
    background-image:
        linear-gradient(30deg,rgba(0,140,255,.22) 12%,transparent 12.5%,transparent 87%,rgba(0,140,255,.22) 87.5%,rgba(0,140,255,.22)),
        linear-gradient(150deg,rgba(0,140,255,.22) 12%,transparent 12.5%,transparent 87%,rgba(0,140,255,.22) 87.5%,rgba(0,140,255,.22)),
        linear-gradient(30deg,rgba(0,140,255,.22) 12%,transparent 12.5%,transparent 87%,rgba(0,140,255,.22) 87.5%,rgba(0,140,255,.22)),
        linear-gradient(150deg,rgba(0,140,255,.22) 12%,transparent 12.5%,transparent 87%,rgba(0,140,255,.22) 87.5%,rgba(0,140,255,.22));
    background-size:90px 156px;
    background-position:0 0,0 0,45px 78px,45px 78px;
    pointer-events:none;
}

.container{
    width:min(920px,100%);
    min-height:100vh;
    padding:46px 20px 28px;
    text-align:center;
    position:relative;
    z-index:2;
}

.logo{
    width:200px;
    max-width:80%;
    margin-bottom:30px;
    opacity:.95;

	position:relative;
	top:20px;

    filter:
        drop-shadow(0 0 6px rgba(255,255,255,.18))
        drop-shadow(0 0 14px rgba(0,140,255,.18));
}

.gears{
    position:relative;
    width:520px;
    max-width:100%;
    height:360px;
    margin:0 auto 6px;
    filter:drop-shadow(0 28px 28px rgba(0,0,0,.42));
}

.orbit{
    position:absolute;
    left:50%;top:50%;
    width:360px;height:360px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    border:1px solid rgba(0,155,255,.13);
    box-shadow:0 0 28px rgba(0,153,255,.22), inset 0 0 42px rgba(0,153,255,.08);
    animation:spin 20s linear infinite;
}
.orbit::before,.orbit::after{
    content:"";
    position:absolute;
    inset:32px;
    border-radius:50%;
    border:1px solid rgba(0,180,255,.16);
}
.orbit::after{
    inset:72px;
    border-color:rgba(0,180,255,.12);
}

.gearBox{
    position:absolute;
    transform-origin:center;
}

.gearBox svg{
    width:100%;height:100%;
    display:block;
    overflow:visible;
}

.gearBig{width:210px;height:210px;left:155px;top:70px;animation:spin 12s linear infinite;z-index:5}
.gearLeft{width:136px;height:136px;left:35px;top:116px;animation:spinReverse 8s linear infinite;z-index:4}
.gearTopRight{width:104px;height:104px;right:52px;top:118px;animation:spinReverse 6s linear infinite;z-index:4}
.gearBottomRight{width:122px;height:122px;right:92px;bottom:35px;animation:spinReverse 7s linear infinite;z-index:6}
.gearBottomLeft{width:82px;height:82px;left:150px;bottom:54px;animation:spin 5s linear infinite;z-index:7}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinReverse{to{transform:rotate(-360deg)}}

h1{
    font-size:42px;
    line-height:1.15;
    margin:0 0 18px;
    text-transform:uppercase;
    letter-spacing:.8px;
    text-shadow:0 0 18px rgba(25,160,255,.42);
}
h1 span{display:block;color:#1ea7ff;font-size:46px}
.message{font-size:20px;color:#e9f5ff;margin-bottom:8px;line-height:1.6}
.submessage{font-size:16px;color:#c1d7ea;line-height:1.7}
.lineGlow{width:min(420px,70%);height:1px;margin:30px auto;background:linear-gradient(90deg,transparent,#0aa2ff,transparent);position:relative}
.lineGlow::after{content:"";position:absolute;left:50%;top:50%;width:13px;height:13px;background:#20aaff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 24px #20aaff}
.footer{margin-top:42px;font-size:14px;line-height:1.45;color:rgba(200,225,245,.55)}
.glow{position:absolute;width:560px;height:560px;border-radius:50%;background:#008cff;filter:blur(210px);opacity:.16;z-index:1;pointer-events:none}.glow1{top:-260px;left:-230px}.glow2{bottom:-260px;right:-230px}

@media(max-width:768px){
    .container{padding-top:34px}
    .logo{width:250px;margin-bottom:10px}
    .gears{height:280px;transform:scale(.82);margin:-10px auto -12px}
    h1{font-size:28px}h1 span{font-size:31px}
    .message{font-size:16px}.submessage{font-size:14px}.footer{margin-top:32px}
}
</style>
</head>
